name: Traceability check
description: >-
  Compares REQUIREMENTS.md and the accepted ADRs (docs/decisions/) against a
  summary of the codebase and posts a requirements-traceability report as a PR
  comment. ADR-governed divergences are treated as intentional. Advisory only —
  never blocks merge.

inputs:
  api-key:
    description: "Anthropic API key (omit in fork/Dependabot contexts; the check skips itself)"
    required: false
    default: ""
  github-token:
    description: "GitHub token with pull-requests:write"
    required: true
  pr-number:
    description: "Pull request number"
    required: true
  repo:
    description: "owner/repo slug (e.g. rolliq-com/invoice-extractor)"
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      shell: bash
      run: pip install anthropic==0.49.0 httpx==0.28.1

    - name: Run traceability check
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        REPO: ${{ inputs.repo }}
      run: python "$GITHUB_ACTION_PATH/traceability_check.py"
