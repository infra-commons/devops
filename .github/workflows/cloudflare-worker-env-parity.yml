name: Cloudflare Worker env parity (reusable)

# Reusable guard-rail for Cloudflare **Workers** projects that deploy a separate
# script per environment (wrangler `env.<name>` blocks → distinct script names).
#
# Why this exists:
#   A Worker's runtime secrets (e.g. AIRTABLE_PAT, ANTHROPIC_API_KEY) live NOT in the
#   repo but in the Cloudflare dashboard, attached PER SCRIPT and bound only on the next
#   deploy. When staging and production are two separate scripts (rolliq-site vs
#   rolliq-site-staging), a secret added to one and forgotten on the other drifts silently
#   — the same outage class that has taken a staging app offline for days.
#   `vars` declared in wrangler.jsonc are safe (version-controlled); dashboard SECRETS are not.
#
#   This is the Workers sibling of cloudflare-env-parity.yml (which covers Pages Direct
#   Upload projects, comparing preview vs production within ONE project).
#
# What it does:
#   Hits the Cloudflare Workers "List Secrets" API for each of the two scripts and asserts
#   their secret-NAME sets match. It compares NAMES ONLY — never values — so it is safe to
#   print and never exposes a secret. A divergent name set fails the check.
#
# Caller pattern (standalone workflow in the app repo):
#   jobs:
#     env-parity:
#       uses: infra-commons/devops/.github/workflows/cloudflare-worker-env-parity.yml@<sha>
#       with:
#         scripts: '["rolliq-site", "rolliq-site-staging"]'
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#
# Resulting check: "env-parity / env-parity". The deploy token (Workers Scripts: Edit)
# already has read access to script secrets, so no new secret is needed.

on:
  workflow_call:
    inputs:
      scripts:
        description: 'JSON array of the two Worker script names to compare'
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions: {}

jobs:
  env-parity:
    name: env-parity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Compare secret name sets across Worker scripts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SCRIPTS_JSON: ${{ inputs.scripts }}
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request, urllib.error

          token   = os.environ["CLOUDFLARE_API_TOKEN"]
          account = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          a, b    = json.loads(os.environ["SCRIPTS_JSON"])

          def secret_names(script):
              url = (f"https://api.cloudflare.com/client/v4/accounts/"
                     f"{account}/workers/scripts/{script}/secrets")
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.load(r)
              except urllib.error.HTTPError as e:
                  print(f"::error::Cloudflare API HTTP {e.code} for script '{script}'. "
                        f"Check the script name and that CLOUDFLARE_API_TOKEN has "
                        f"'Workers Scripts: Read' (or Edit) on this account.")
                  print(e.read().decode("utf-8", "replace"))
                  sys.exit(1)
              if not data.get("success"):
                  print(f"::error::Cloudflare API returned success=false for "
                        f"'{script}': {data.get('errors')}")
                  sys.exit(1)
              return set(s["name"] for s in (data.get("result") or []))

          set_a, set_b = secret_names(a), secret_names(b)
          print(f"{a:>28}: {sorted(set_a) or '(none)'}")
          print(f"{b:>28}: {sorted(set_b) or '(none)'}")

          only_a = sorted(set_a - set_b)
          only_b = sorted(set_b - set_a)

          if not only_a and not only_b:
              print(f"\nOK — secret name sets match across '{a}' and '{b}' "
                    f"({len(set_a)} secret(s)).")
              sys.exit(0)

          print()
          if only_a:
              print(f"::error::Only in '{a}', missing from '{b}': {only_a}")
          if only_b:
              print(f"::error::Only in '{b}', missing from '{a}': {only_b}")
          print("\nWorker scripts have diverged. Add the missing secret(s) with "
                "`wrangler secret put <NAME>` (or the Cloudflare dashboard) on the "
                "deficient script, then redeploy that environment so they bind. "
                "(This check compares NAMES only, never values.)")
          sys.exit(1)
          PY
